<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', system-ui, sans-serif;
  background: #111827;
  color: #fff;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

#page {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── Text layer ── */
#text-layer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

#text-layer h1 {
  font-family: 'Pridi', serif;
  font-size: clamp(2.8rem, 7vw, 4.5rem);
  font-weight: 600;
  color: #ffffff;
  margin-bottom: 10px;
}

#text-layer .subtitle {
  color: #6b7280;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.05rem;
  margin-bottom: 8px;
}

#text-layer .nav-line {
  color: #6b7280;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.05rem;
}
#text-layer .nav-line a {
  color: #06b6d4;
  text-decoration: none;
  transition: border-bottom 0.15s;
}
#text-layer .nav-line a:hover { border-bottom: 2px solid #06b6d4; }
.chip:hover {
  background: rgba(6,182,212,0.15);
  border-color: rgba(6,182,212,0.5);
  color: #06b6d4;
  transform: translateY(-2px);
}
.chip svg { flex-shrink: 0; }

/* ── SVG canvas layer ── */
#svg-layer {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  width: 100%;
  height: 100%;
}
#svg-layer svg { width: 100%; height: 100%; }

/* ── Star canvas ── */
#star-canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Tumbleweed ── */
#tumbleweed {
  position: absolute;
  z-index: 5;
  bottom: 22%;
  pointer-events: none;
  animation: tumble-roll 12s linear infinite;
  transform-origin: center center;
}
@keyframes tumble-roll {
  0%   { left: -120px; transform: rotate(0deg) translateY(0); opacity: 0; }
  5%   { opacity: 1; }
  45%  { transform: rotate(540deg) translateY(-18px); }
  50%  { transform: rotate(720deg) translateY(0); }
  92%  { opacity: 1; }
  100% { left: calc(100vw + 120px); transform: rotate(1440deg) translateY(0); opacity: 0; }
}

/* ── Screen shake ── */
@keyframes shake {
  0%,100% { transform: translate(0,0); }
  15%  { transform: translate(-6px, 3px); }
  30%  { transform: translate(6px, -3px); }
  45%  { transform: translate(-4px, 4px); }
  60%  { transform: translate(4px, -2px); }
  75%  { transform: translate(-2px, 2px); }
}
.shaking { animation: shake 0.4s ease; }

/* ── Prick flash ── */
#prick-flash {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(6,182,212,0.08);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
}

/* ── Easter egg toast ── */
#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(6,182,212,0.15);
  border: 1px solid rgba(6,182,212,0.4);
  backdrop-filter: blur(10px);
  color: #06b6d4;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 100px;
  z-index: 200;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.subtitle, .nav-line {
  transition: color 0.3s;
  color: white; 
  font-weight: bold;
}
</style>

          <path fill="#155e75" d="m330 139.3c15.4 3.9-12.7 14.1-18 29.7c-5.3 15.5-8 26-8 26v442.7q-13.7-0.7-27-2.4v-92.3c0 0-53.3-2.3-77-26c-49.3-49.3-48-81-48-81v-101c0 0 1.9-14.1 8-17c6.1-2.9 13-7 13-7c0 0-6.6 9-9 19c-2.4 10-1.6 77.9-1.6 99.7c0 21.8 17.5 47.3 39.1 65.4c31 26 74.5 26.9 74.5 26.9v-344c0 0 6.4-22.2 18.4-30.3c12-8.1 22.8-11.7 35.6-8.4zm33 351.7c0 0 13.5 1.7 54-14c50.9-19.8 71.2-79.5 71.2-79.5c0 0-8.4 51.7-43.2 83.5c-31.9 29.2-82 32-82 32zm97-250c0 0-8.2 5.1-13 19c-4.8 13.9-1.8 88.3-1.8 96.7c0 8.4-1.1 30.9-11.4 44c-12.4 15.7-24.1 19.5-24.1 19.5c0 0 9.3-4.9 14.3-18.2c5-13.3 6-24 6-24v-114c0 0 5.9-16.9 15-20c9.1-3.1 15-3 15-3z"/>

<script>
/* ── 1. STAR FIELD ── */
(function() {
  const canvas = document.getElementById('star-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 4000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.55,
        r: Math.random() * 1.4 + 0.3,
        alpha: Math.random() * 0.7 + 0.2,
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2,
        px: 0, py: 0
      });
    }
  }

  let t = 0;
  function drawStars(ox, oy) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.016;
    stars.forEach(s => {
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x + ox * 0.3, s.y + oy * 0.3, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(2)})`;
      ctx.fill();
    });
  }

  window.drawStars = drawStars;

  resize();
  initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });

  // initial animation loop (overridden by parallax when mouse moves)
  let animating = true;
  function loop() {
    if (animating) drawStars(0, 0);
    requestAnimationFrame(loop);
  }
  loop();
  window.starAnimating = true;
})();

/* ── 2. PARALLAX (mouse + gyroscope) ── */
const layers = [
  { ids: ['gp1'],                    depth: -240 },
  { ids: ['gp2'],                    depth: -150 },
  { ids: ['gp3sky','gp3cacti','fog-path'], depth: -80 },
  { ids: ['big404'],                 depth: -20  },
  { ids: ['gp5floor','gp5cacti'],    depth:  80  },
  { ids: ['gp6'],                    depth:  150 },
  { ids: ['gp7'],                    depth:  300 },
];

let starOX = 0, starOY = 0;

function applyParallax(nx, ny) {
  layers.forEach(layer => {
    const tx = layer.depth * nx;
    const ty = layer.depth * ny;
    layer.ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.transform = `translate(${tx}px,${ty}px)`;
    });
  });
  starOX = nx * 80;
  starOY = ny * 80;
  window.drawStars(starOX, starOY);
}

// Mouse parallax
window.addEventListener('mousemove', function(e) {
  requestAnimationFrame(() => {
    applyParallax(
      e.clientX / window.innerWidth - 0.5,
      e.clientY / window.innerHeight - 0.5
    );
  });
});

// Gyroscope parallax (mobile)
let gyroSupported = false;
function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') attachGyro();
    }).catch(() => {});
  } else if (window.DeviceOrientationEvent) {
    attachGyro();
  }
}

function attachGyro() {
  gyroSupported = true;
  let baseGamma = null, baseBeta = null;
  window.addEventListener('deviceorientation', function(e) {
    if (e.gamma === null) return;
    if (baseGamma === null) { baseGamma = e.gamma; baseBeta = e.beta; }
    const nx = Math.max(-0.5, Math.min(0.5, (e.gamma - baseGamma) / 40));
    const ny = Math.max(-0.5, Math.min(0.5, (e.beta  - baseBeta)  / 40));
    requestAnimationFrame(() => applyParallax(nx, ny));
  });
}

// Attempt gyro on first touch (iOS requires user gesture)
window.addEventListener('touchstart', function gyroBoot() {
  requestGyro();
  window.removeEventListener('touchstart', gyroBoot);
}, { once: true });
requestGyro();



/* ── 4. CACTUS EASTER EGG ── */
let toastTimer = null;
let prickCount = 0;

const toastMessages = [
  '🌵 Ouch! That cactus bit back.',
  '🌵 Still poking? Brave.',
  '🌵 It warned you the first time.',
  '🌡️ Stubborn. I respect it.',
  '🌵 OK you really like pain huh.',
];

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

function triggerPrick() {
  const flash = document.getElementById('prick-flash');
  const page  = document.getElementById('page');

  // Flash
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 120);

  // Shake
  page.classList.remove('shaking');
  void page.offsetWidth; // reflow
  page.classList.add('shaking');
  setTimeout(() => page.classList.remove('shaking'), 450);

  // Toast
  showToast(toastMessages[Math.min(prickCount, toastMessages.length - 1)]);
  prickCount++;

  // Sound (Web Audio API — short 440Hz blip)
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.15);
  } catch(e) {}
}

// Foreground cacti clickable
document.getElementById('gp5cacti').addEventListener('click', triggerPrick);

// Also attach to blurry near cacti for wider hit area
document.getElementById('svg-layer').addEventListener('click', function(e) {
  const el = e.target;
  if (el.closest && (el.closest('#gp5cacti') || el.closest('#gp6') || el.closest('#gp7'))) {
    triggerPrick();
  }
});
</script>
