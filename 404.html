<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found · Abhiram</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563EB'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Inter,system-ui,sans-serif' font-weight='700' font-size='13' fill='white'>JA</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #F5F5F5;
  color: #111111;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  -webkit-font-smoothing: antialiased;
}
.container {
  text-align: center;
  max-width: 480px;
}
.code {
  font-size: clamp(5rem, 18vw, 8rem);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1;
  color: #E5E5E5;
  margin-bottom: 24px;
}
.code span { color: #2563EB; }
h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
p {
  font-size: 1rem;
  color: #555555;
  line-height: 1.7;
  margin-bottom: 36px;
}
.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  padding: 12px 24px;
  background: #2563EB;
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.18s, transform 0.18s;
}
.btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  padding: 12px 24px;
  background: transparent;
  color: #111111;
  border: 1px solid #CCCCCC;
  border-radius: 8px;
  text-decoration: none;
  transition: border-color 0.18s, transform 0.18s;
}
.btn-ghost:hover { border-color: #111111; transform: translateY(-1px); }
</style>
</head>
<body>
  <div class="container">
    <div class="code"><span>4</span>0<span>4</span></div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
    <div class="actions">
      <a href="/" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go Home
      </a>
      <a href="/#contact" class="btn-ghost">Get In Touch</a>
    </div>
  </div>
</body>
</html>
